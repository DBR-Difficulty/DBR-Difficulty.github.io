<!DOCTYPE html>
<html lang="ja">
<head>

  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <meta charset="UTF-8"/>
  <title>DBR IR</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <link href="style/style.css" rel="stylesheet">
  <script src="style/jquery-2.0.2.min.js"></script>
  <style>
    .sortable {
      cursor: pointer;
      text-decoration: underline;
      position: relative;
      padding-left: 1em;
      padding-right: 1em;
    }

    .sortable::after {
      content: "";
    }

    .sortable::after {
      content: "▲";
      font-size: 0.7em;
      position: absolute;
      right: 0.2em;
      top: 0.5em;
      color: transparent;
      transition: color 0.2s ease;
    }

    /* 昇順（▲）を表示 */
    .sortable.asc::after {
      color: #888;
      content: "▲";
    }

    /* 降順（▼）を表示 */
    .sortable.desc::after {
      color: #888;
      content: "▼";
    }

    .sortable:hover {
      color: blue;
    }

    body {
      font-family: "Noto Sans JP", sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      background-color: #fff;
      padding: 1.25rem;
      max-width: 100%;
    }

    .tr_header {
      background-color: #eeeeee;
      color: #000000;
      font-size: 1rem;
    }

    .delete-btn {
      font-size: 0.9rem;
      padding: 0.2em 0.4em;
      cursor: pointer;
    }

    #scoreTable {
      position: relative;
    }

    /* ボタンを浮かせて右端に配置 */
    .delete-btn-wrapper {
      position: absolute;
      right: -7.5rem;
      transform: translateY(-100%);
      z-index: 2;
    }

    .delete-btn {
      font-size: 0.9rem;
      cursor: pointer;
    }

    .update-date {
      min-width: 9ch;
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5CPZDQB"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <strong><span id="page-title" style="font-size: 2rem;"></span></strong>
  <span id="notes-disp"></span>
  <table border="1" id="scoreTable">
    <thead>
      <tr class="tr_header">
        <th>#</th>
        <th>ユーザー名</th>
        <th id="sort-lamp" class="sortable">ランプ</th>
        <th id="sort-bp" class="sortable">BP</th>
        <th id="sort-score" class="sortable">スコア</th>
        <th>スコアランク</th>
        <th>実質ランク</th>
        <th class="update-date">最終更新日</th>
      </tr>
    </thead>
    <tbody><tr><td colspan="8">読み込み中…</td></tr></tbody>
  </table>

  <script type="module">
    import { escapeHtml } from "./html.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      getDoc,
      doc,
      deleteDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDgU5OwLsDBoTeq_jXS-frSAf9kDDwl6L0",
      authDomain: "dbr-ir.firebaseapp.com",
      projectId: "dbr-ir",
      storageBucket: "dbr-ir.firebasestorage.app",
      messagingSenderId: "464886830974",
      appId: "1:464886830974:web:f90d3605f62673136f052f",
      measurementId: "G-THHFG18D5G"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    let currentUserUid = null;

    onAuthStateChanged(auth, async (user) => {
      currentUserUid = user?.uid || null;
      await loadAndRender();
    });

    const params = new URLSearchParams(location.search);
    const title = params.get("title");
    const notesValueParam = Number(params.get("notesValue") || 0);
    const notesDisplayParamRaw = params.get("notesDisplay") || "";
    const notesDisplayParam = Number(notesDisplayParamRaw.replace(/[^\d]/g, ""));
    const displayLevelParam = params.get("displayLevel") || "";

    let notesDisplay = "不明", scratchDisplay = "不明";
    if (isNaN(notesDisplayParamRaw) && !notesDisplayParam <= 0) {
      notesDisplay = notesValueParam;
    } else if (!isNaN(notesDisplayParamRaw) && !notesDisplayParam <= 0) {
      notesDisplay = notesDisplayParam;
      scratchDisplay = notesValueParam - notesDisplayParam;
    } else if (!notesDisplayParam <= 0) {
      scratchDisplay = notesValueParam - notesDisplayParam;
    }

    document.title = `${title} - DBR IR`;
    document.getElementById("page-title").textContent = `${displayLevelParam} ${title} `;
    document.getElementById("notes-disp").textContent =
      `Notes: ${notesDisplay} Scratch: ${scratchDisplay}`;

    const tbody = document.querySelector("#scoreTable tbody");
    let rows = [];

    // キャッシュ設定
    const FORCE_REFRESH_INTERVAL = 365 * 24 * 60 * 60 * 1000; // 365日
    const DIFF_CHECK_INTERVAL = 10 * 1000; // 10秒

    async function loadAndRender() {
      console.log("[loadAndRender] 開始 title:", title);
      if (!title) {
        tbody.innerHTML = "<tr><td colspan='8'>曲名が指定されていません</td></tr>";
        return;
      }

      // キャッシュキー（曲名を含める）
      const cacheKey = `ranking_${title}`;
      const cacheTimeKey = `ranking_time_${title}`;
      const lastSyncKey = `ranking_lastsync_${title}`;

      const cachedData = localStorage.getItem(cacheKey);
      const cachedTime = localStorage.getItem(cacheTimeKey);
      const lastSyncTime = localStorage.getItem(lastSyncKey);
      const now = Date.now();

      let scores = [];

      // 現在のページ以外の期限切れデータを削除
      cleanupOldCache(cacheKey);

      if (cachedData && cachedTime && (now - parseInt(cachedTime)) > FORCE_REFRESH_INTERVAL) {
        console.log("[loadAndRender] キャッシュあり");
        // キャッシュが存在する場合
        const cache = JSON.parse(cachedData);
        scores = cache.scores;

        // 差分更新チェック（10秒以上経過している場合のみ）
        if (!lastSyncTime || (now - parseInt(lastSyncTime)) > DIFF_CHECK_INTERVAL) {
          console.log("[loadAndRender] 差分チェック実行");
          try {
            const lastSync = lastSyncTime ? new Date(parseInt(lastSyncTime)) : new Date(0);

            // 差分取得クエリ
            const diffQuery = query(
              collection(db, "scores"),
              where("title", "==", title),
              where("timestamp", ">", lastSync)
            );

            const diffSnap = await getDocs(diffQuery);

            if (diffSnap.size > 0) {
              // 差分データをマージ（userUidをキーに）
              const scoreMapTemp = new Map(scores.map(s => [s.userUid, s]));

              diffSnap.forEach(docSnap => {
                const data = docSnap.data();
                scoreMapTemp.set(data.userUid, {
                  ...data,
                  docId: docSnap.id
                });
              });

              scores = Array.from(scoreMapTemp.values());

              // キャッシュを更新
              localStorage.setItem(cacheKey, JSON.stringify({ scores }));
            }

            // 最終同期時刻を更新
            localStorage.setItem(lastSyncKey, now.toString());

          } catch (error) {
            console.error('差分取得エラー:', error);
          }
        }

      } else {
        // キャッシュがない、または全件再取得が必要
        console.log("[loadAndRender] 全件取得開始");
        try {
          const q = query(
            collection(db, "scores"),
            where("title", "==", title)
          );
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            tbody.innerHTML = "<tr><td colspan='8'>データが見つかりません</td></tr>";
            return;
          }

          snapshot.docs.forEach(docSnap => {
            const data = docSnap.data();
            scores.push({
              ...data,
              docId: docSnap.id
            });
          });

          // キャッシュに保存
          try {
            localStorage.setItem(cacheKey, JSON.stringify({ scores }));
            localStorage.setItem(cacheTimeKey, now.toString());
            localStorage.setItem(lastSyncKey, now.toString());
          } catch (e) {
            console.warn('キャッシュ保存失敗:', e);
          }

        } catch (e) {
          console.error(e);
          tbody.innerHTML = "<tr><td colspan='8'>取得に失敗しました</td></tr>";
          return;
        }
      }

      // ユーザー情報を取得
      const userCache = {};
      rows = await Promise.all(scores.map(async data => {
        const uid = data.userUid;
        if (!userCache[uid]) {
          try {
            const userSnap = await getDoc(doc(db, "users", uid));
            if (userSnap.exists()) {
              const u = userSnap.data();
              userCache[uid] = {
                displayName: u.displayName || "未設定",
                anonymous: !!u.anonymous
              };
            } else {
              userCache[uid] = { displayName: "不明ユーザー", anonymous: false };
            }
          } catch {
            userCache[uid] = { displayName: "取得失敗", anonymous: false };
          }
        }
        return { ...data, ...userCache[uid] };
      }));

      // ===== ランキング算出 & ranking_cache 書き込み =====
      // BP: 小さい順（-1/null は除外）、スコア: 大きい順（-1/null は除外）
      // 同点は同順位（1位タイなら全員1位）
      function calcRanks(arr, key, ascending) {
        // 有効値のみ抽出してソート
        const valid = arr
          .map(d => ({ uid: d.userUid, val: (d[key] === -1 || d[key] == null) ? null : Number(d[key]) }))
          .filter(x => x.val !== null);
        valid.sort((a, b) => ascending ? a.val - b.val : b.val - a.val);

        // 同点同順位マップ作成
        const rankMap = new Map(); // uid -> rank
        let rank = 1;
        for (let i = 0; i < valid.length; i++) {
          if (i > 0 && valid[i].val !== valid[i - 1].val) rank = i + 1;
          rankMap.set(valid[i].uid, rank);
        }
        return rankMap;
      }

      const bpRankMap    = calcRanks(scores, "bp",    true);   // BP: 昇順
      const scoreRankMap = calcRanks(scores, "score", false);  // スコア: 降順

      // ranking_cache への書き込み
      // キーは "曲名(難易度)" 形式。英数字・記号始まり → ranking_cache/{uid}、
      // 日本語始まり（ひらがな/カタカナ/漢字）→ ranking_cache/{uid}_jp に振り分ける。
      async function updateRankingCache(uid, chartTitle, bpRank, scoreRank) {
        console.log("[updateRankingCache] 開始 uid:", uid, "title:", chartTitle, "bp:", bpRank, "score:", scoreRank);
        const isJp = /^[^\x00-\x7Eａ-ｚＡ-Ｚ０-９]/.test(chartTitle);
        const docId = isJp ? `${uid}_jp` : uid;
        const docRef = doc(db, "ranking_cache", docId);
        const now = Date.now();

        try {
          const snap = await getDoc(docRef);
          const existing = snap.exists() ? (snap.data().rankingJson ?? {}) : {};
          existing[chartTitle] = { bprank: bpRank ?? null, scorerank: scoreRank ?? null };

          // rankingUpdatedAt のみ更新（scoreUpdatedAt はスコア変更時のみ更新するので触らない）
          await setDoc(docRef, {
            rankingJson:      existing,
            rankingUpdatedAt: now
          }, { merge: true });

          // jp側の場合もメインドキュメントの rankingUpdatedAt を合わせる
          if (isJp) {
            await setDoc(doc(db, "ranking_cache", uid), { rankingUpdatedAt: now }, { merge: true });
          }
        } catch (e) {
          console.warn("[updateRankingCache] ranking_cache 書き込み失敗:", e);
        }
      }

      // 自分のランクを取得して書き込む
      if (currentUserUid) {
        const myBpRank    = bpRankMap.get(currentUserUid)    ?? null;
        const myScoreRank = scoreRankMap.get(currentUserUid) ?? null;
        // chartTitle = "曲名(難易度)" 形式（URLパラメータから）
        // title は既に URLSearchParams で取得済み
        updateRankingCache(currentUserUid, title, myBpRank, myScoreRank);
      }

      // ソートして表示
      sortBy("score");
    }

    const lampSortOrder = { F: 0, E: 1, AE: 2, C: 3, H: 4, EXH: 5, FC: 6 };

    const lampCodeToText = (code) => ({
      FC: "FULL COMBO", EXH: "EX-HARD CLEAR", H: "HARD CLEAR", C: "CLEAR",
      E: "EASY CLEAR", AE: "A-EASY CLEAR", F: "FAILED"
    }[code] || code || "");

    const lampColorMap = {
      "NO PLAY": "transparent", F: "#666666", AE: "#b366ff", E: "#33cc33", C: "#66ccff",
      H: "#ffffff", EXH: "#ffff00", FC: "#ffa500"
    };

    const setLampCellStyle = (cell, value) => {
      if (value === "NO PLAY") {
        cell.style.background = "transparent";
        cell.style.color = "transparent";
      } else {
        cell.style.background = lampColorMap[value] || "transparent";
        cell.style.color = (["H", "EXH", "FC"].includes(value)) ? "black" : "white";
      }
    };

    // スコアランク計算
    function getRankWithDiff(score, maxScore) {
      if (score < 0) return "F";

      const scoreThresholds = [
        { rank: "MAX", threshold: maxScore },
        { rank: "AAA", threshold: (maxScore * 8) / 9 },
        { rank: "AA",  threshold: (maxScore * 7) / 9 },
        { rank: "A",   threshold: (maxScore * 6) / 9 },
        { rank: "B",   threshold: (maxScore * 5) / 9 },
        { rank: "C",   threshold: (maxScore * 4) / 9 },
        { rank: "D",   threshold: (maxScore * 3) / 9 },
        { rank: "E",   threshold: (maxScore * 2) / 9 },
        { rank: "F",   threshold: 0 }
      ];

      if (score > maxScore) {
        const diff = score - maxScore;
        return `!? (MAX+${diff})`;
      }

      for (let i = 0; i < scoreThresholds.length; i++) {
        const { rank, threshold } = scoreThresholds[i];
        const thresholdCeil = Math.ceil(threshold);

        if (score >= thresholdCeil) {
          const currentDiff = score - thresholdCeil;

          if (i > 0) {
            const nextThresholdCeil = Math.ceil(scoreThresholds[i - 1].threshold);
            const toNextRank = nextThresholdCeil - score;

            if (Math.abs(toNextRank) <= Math.abs(currentDiff)) {
              const nextRank = scoreThresholds[i - 1].rank;
              return `${rank} (${nextRank}-${toNextRank})`;
            }
          }
          return `${rank} (${rank}+${currentDiff})`;
        }
      }
      return "F";
    }

    function getScoreRate(score, maxScore) {
      if (!maxScore || maxScore <= 0 || isNaN(score)) return "";
      const rate = (score / maxScore) * 100;
      const floored = Math.floor(rate * 100) / 100;
      return `(${floored.toFixed(2)}%)`;
    }

    function renderTable(data) {
      tbody.innerHTML = "";
      data.forEach((d, index) => {
        const score = d.score === -1 ? null : d.score;

        const scoreRank = score !== null && notesValueParam > 0
          ? getRankWithDiff(score, notesValueParam * 2) + getScoreRate(score, notesValueParam * 2)
          : "";
        const realScoreRank = score !== null && notesDisplayParam > 0
          ? getRankWithDiff(score, notesDisplayParam * 2) + getScoreRate(score, notesDisplayParam * 2)
          : "";

        const isOwnData = currentUserUid && d.userUid === currentUserUid;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${
            d.anonymous
              ? "匿名希望"
              : `<a href="dbr_ir_playerdata.html?uid=${escapeHtml(d.userUid)}" target="_blank">${escapeHtml(d.displayName)}</a>`
          }</td>
          <td class="lamp-cell">${escapeHtml(lampCodeToText(d.lamp))}</td>
          <td>${d.bp === -1 ? "" : escapeHtml(d.bp)}</td>
          <td>${score !== null ? score : ""}</td>
          <td>${scoreRank}</td>
          <td>${realScoreRank}</td>
          <td>${new Date(d.timestamp).toLocaleDateString("ja-JP")}</td>
        `;
        tr.style.position = "relative";

        tbody.appendChild(tr);

        // ランプ色付け
        setLampCellStyle(tr.querySelector(".lamp-cell"), d.lamp);

        // 自分のデータのみ削除ボタンを別で追加
        if (isOwnData) {
          const wrapper = document.createElement("div");
          wrapper.className = "delete-btn-wrapper";
          wrapper.innerHTML = `<button class="delete-btn" data-doc-id="${escapeHtml(d.docId)}">この記録を削除</button>`;
          tbody.appendChild(wrapper); // trの直後に追加

          const btn = wrapper.querySelector(".delete-btn");
          btn.addEventListener("click", async () => {
            if (!confirm("このスコアを削除しますか？")) return;
            if (!confirm("後悔しませんね？")) return;
            try {
              await deleteDoc(doc(db, "scores", d.docId));

              // キャッシュからも削除
              const cacheKey = `ranking_${title}`;
              const cachedData = localStorage.getItem(cacheKey);
              if (cachedData) {
                const cache = JSON.parse(cachedData);
                cache.scores = cache.scores.filter(s => s.docId !== d.docId);
                localStorage.setItem(cacheKey, JSON.stringify(cache));
              }

              // 削除を score_updates に記録 + ranking_cache の scoreUpdatedAt を更新
              // → 他のユーザーが次回 upload.html を開いたとき再計算を促す
              try {
                const now = Date.now();
                await Promise.all([
                  addDoc(collection(db, "score_updates"), {
                    userUid:   d.userUid,
                    titles:    [title],
                    updatedAt: now,
                    delFlag:   true
                  }),
                  setDoc(doc(db, "ranking_cache", d.userUid), { scoreUpdatedAt: now }, { merge: true })
                ]);
              } catch (e) {
                console.warn("[deleteScore] score_updates 書き込み失敗:", e);
              }

              tr.remove();
              wrapper.remove();
            } catch (e) {
              alert("削除に失敗しました。: " + e.message);
            }
          });
        }
      });
    }

    let currentSort = { key: null, asc: false };

    function sortBy(key) {
      // データ無しの場合はソート処理を行わない
      if (!rows || rows.length === 0) {
        return;
      }

      // 昇順・降順の状態を更新
      if (currentSort.key === key) {
        currentSort.asc = !currentSort.asc;
      } else {
        currentSort.key = key;
        // スコアとランプは降順が自然
        currentSort.asc = (key === "score" || key === "lamp") ? false : true;
      }

      // 既存の矢印表示を全てクリア
      document.querySelectorAll(".sortable").forEach(th => {
        th.classList.remove("asc", "desc");
      });

      // 今回ソート対象の列に矢印クラス追加
      const sortTh = document.getElementById(`sort-${key}`);
      if (sortTh) {
        sortTh.classList.add(currentSort.asc ? "asc" : "desc");
      }

      const sorted = [...rows].filter(d =>
        !(d.lamp === "NO PLAY" && (d.score === -1 || d.score == null) && (d.bp === -1 || d.bp == null))
      ).sort((a, b) => {
        let va = a[key];
        let vb = b[key];
        const getVal = v => (v === null || v === -1 || v === undefined || v === "") ? null : v;
        va = getVal(va);
        vb = getVal(vb);

        if (key === "lamp") {
          const lampA = lampSortOrder[va] ?? -1;
          const lampB = lampSortOrder[vb] ?? -1;
          if (lampA !== lampB) return currentSort.asc ? lampA - lampB : lampB - lampA;
          // 同ランプならBPで比較
          const bpa = getVal(a.bp);
          const bpb = getVal(b.bp);
          if (bpa === null && bpb === null) return 0;
          if (bpa === null) return 1;
          if (bpb === null) return -1;
          // ランプ昇順 → BP 降順
          // ランプ降順 → BP 昇順
          return currentSort.asc ? (bpb - bpa) : (bpa - bpb);
        }

        if (va === null && vb === null) return 0;
        if (va === null) return 1;
        if (vb === null) return -1;

        if (typeof va === "number" && typeof vb === "number") {
          return currentSort.asc ? va - vb : vb - va;
        }
        return currentSort.asc ? `${va}`.localeCompare(`${vb}`) : `${vb}`.localeCompare(`${va}`);
      });

      renderTable(sorted);
    }

    document.getElementById("sort-lamp").addEventListener("click", () => sortBy("lamp"));
    document.getElementById("sort-bp").addEventListener("click", () => sortBy("bp"));
    document.getElementById("sort-score").addEventListener("click", () => sortBy("score"));

    // localStorageのクリーンアップ関数
    function cleanupOldCache(currentKey) {
      const now = Date.now();
      const MAX_AGE = 365 * 24 * 60 * 60 * 1000; // 365日

      const prefixes = ['playdata_', 'ranking_'];
      const keysToDelete = [];
      const processedBaseKeys = new Set();

      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);

        const isTarget = prefixes.some(prefix => key.startsWith(prefix));
        if (!isTarget) continue;

        if (key.includes('_time_')) {
          const baseKey = key.replace('_time_', '_');

          if (processedBaseKeys.has(baseKey)) continue;
          processedBaseKeys.add(baseKey);

          const prefix = baseKey.match(/^(playdata|ranking)_/)[0];
          const suffix = baseKey.replace(prefix, '');

          // 現在表示中のページはスキップ
          if (baseKey === currentKey) continue;

          const timestamp = parseInt(localStorage.getItem(key));

          // 期限切れのみ削除対象に追加
          if (isNaN(timestamp) || (now - timestamp) > MAX_AGE) {
            keysToDelete.push(baseKey);
            keysToDelete.push(prefix + 'time_' + suffix);
            keysToDelete.push(prefix + 'lastsync_' + suffix);
          }
        }
      }

      // 削除実行
      keysToDelete.forEach(key => {
        try {
          localStorage.removeItem(key);
        } catch (e) {
          console.warn(`キャッシュ削除失敗: ${key}`, e);
        }
      });
    }
  </script>
</body>
