<!DOCTYPE HTML>
<html lang="ja">
    <head>
        <!-- Google Tag Manager -->

        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-M5CPZDQB');</script>

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
        <meta name="msapplication-TileImage" content="/mstile-150x150.png" />

        <title>DBR EASY(未査定有)</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta name="alldbrtable" content="./dbralleheader_experimental.json"> <!-- 固定json読み込み用 -->
        <link href="style/experimental_style.css" rel="stylesheet">
        <script src="style/jquery-2.0.2.min.js"></script>
        <script src="modal_template.js"></script>
        <script src="export_json.js"></script>

        <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.0/dist/nouislider.min.js"></script>
    </head>

    <body>
        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M5CPZDQB"
        height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->

        <center>
            <strong><span style="font-size: 2rem;">DBR難易度表(イージー)(未査定有)(<span class="page-date">読み込み中</span>)</span></strong><br>

            <!-- ここに注意書きの枠を追加 -->
            <div class="notice-box">
                <ul>
                    <li>GASでスプレッドシートから自動生成せずサイトに生成後のJSONを置いて読み込んでいます</li>
                    <li>実験用です <b>ＥＸＰＥＲＩＭＥＮＴＡＬ</b> ご留意ください</li>
                    <li>最新の表状況は反映されません TOPから目的の難易度表に飛んでください</li>
                    <li id="lastUpdated">難易度表データの最終生成日は です</li>
                </ul>
            </div>

            <!-- フィルター機能 -->
            <div class="filter-container">
                <div class="filter-row">
                    <div class="filter-label">表示レベル範囲:</div>
                    <div class="slider-container">
                        <div id="level-range"></div>
                        <div class="input-group">
                            <label>☆: </label>
                            <input type="number" id="level-min" step="0.01" style="width:6ch;">
                            〜
                            <input type="number" id="level-max" step="0.01" style="width:6ch;">
                        </div>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-label">表示SPレベル範囲:</div>
                    <div class="slider-container">
                        <div id="splv-range"></div>
                        <div class="input-group">
                            <label>☆: </label>
                            <input type="number" id="splv-min" step="1" style="width:4ch;">
                            〜
                            <input type="number" id="splv-max" step="1" style="width:4ch;">
                        </div>
                    </div>
                </div>
                <div class="filter-row">
                    <label><input type="checkbox" id="hide-acdeleted"> AC削除・未収録曲を除く</label>
                    <button id="reset-filters" style="padding: 0.5em 1em;">フィルターをリセット</button>
                </div>
            </div>

            <div class="toplink-margin">
                <a href="index.html">TOPに戻る</a>
                <button id="export-excel-btn" disabled>難易度表をExcelで出力</button>
            </div>

            <!-- ExcelJS CDN（最新版）-->
            <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

            <!-- 共通JS -->
            <script src="export_excel.js"></script>
        </center>

        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-text">Now Loading…</div>
        </div>

        <div class="tableflame">
            <!-- テーブルを表示する場所 -->
            <table align="center" cellspacing="1" cellpadding="2" border="0" bgcolor="#000000" id="table_int"></table>
        </div>

        <script>
            let allSongData = [];
            let currentMark = "";
            let currentSongTimes = {};
            let levelSlider;

            const SLIDER_DEFAULTS = {
                levelMin: 10.20, levelMax: 13.01,
                splvMin: 1, splvMax: 12
            };

            // ドキュメントが読み込まれたときに実行される関数
            $(document).ready(function() {
                $("#loading").show(); // ローディング表示

                // まずヘッダーファイル（dbralleheader_experimental.json）を読み込む
                $.getJSON($("meta[name=alldbrtable]").attr("content"), function(header) {
                    const dataUrl = header.data_url;
                    const timesUrl = header.song_times;  // 追加: 演奏時間JSONのURL
                    currentMark = header.symbol;

                    // JSONファイルの更新日を取得してページに反映
                    fetch(dataUrl, { method: "HEAD" })
                        .then(response => {
                            const lastModified = response.headers.get("Last-Modified");
                            if (lastModified) {
                                const yyyymmdd = header.last_updated;

                                // <title> の更新
                                document.title = `${document.title}(${yyyymmdd})`;

                                // 本文中の日付を書き換える（.page-date 全部）
                                $(".page-date").text(yyyymmdd);
                            }

                            // ▼ 日付整形して最終生成日に反映
                            if (header.last_updated && /^\d{8}$/.test(header.last_updated)) {
                                const y = header.last_updated.slice(0, 4);
                                const m = header.last_updated.slice(4, 6);
                                const d = header.last_updated.slice(6, 8);
                                const formatted = `${y}/${m}/${d}`;
                                const elem = document.getElementById("lastUpdated");
                                if (elem) {
                                    elem.innerHTML = `表データの最終生成日は <b>${formatted}</b> です`;
                                }
                            }
                        })
                        .catch(err => {
                            console.error("更新日の取得に失敗:", err);
                        });

                    // 実データの読み込み
                    // ローカルJSONに固定

                    // song_times も同時に取得してから makeDBRTable を呼ぶ
                    $.when(
                        $.getJSON(dataUrl),
                        timesUrl ? $.getJSON(timesUrl) : $.Deferred().resolve({})
                    ).done(function(info, songTimesResult) {
                        allSongData = info[0];
                        currentSongTimes = songTimesResult[0];

                        // スライダー初期化
                        initializeSlider();

                        // 初回描画
                        updateTable();

                        $("#loading").remove(); // ローディング終了
                        document.getElementById("export-excel-btn").disabled = false; // Excel出力可能

                        setupModal([
                            "level", "recommend", "ver", "title", "bpm",
                            "lamp", "bp", "score", "score-rank", "real-rank",  // 拡張機能用
                            "notes", "ir", "splv", "video", "textage",
                            "gauge", "density", "comment", "inf", "unlock"
                            ]); // 表描画後にモーダルを設定
                    }).fail(function() {
                        $("#loading").html(
                            "難易度表データの読み込みに失敗しました。<br>" +
                            "サーバーエラーの可能性があります。"
                        );
                        console.error("JSONの読み込みに失敗しました:", dataUrl);
                    });
                });
            });

            // フィルター設定をlocalStorageに保存する関数
            function saveFilterSettings() {
                const splvSlider = document.getElementById("splv-range");
                const [lvMin, lvMax] = levelSlider.noUiSlider.get().map(v => parseFloat(v.replace("☆", "")));
                const [splvMin, splvMax] = splvSlider.noUiSlider.get().map(v => parseInt(v));
                lvMin === SLIDER_DEFAULTS.levelMin ? localStorage.removeItem("dbr_filter_levelMin") : localStorage.setItem("dbr_filter_levelMin", lvMin);
                lvMax === SLIDER_DEFAULTS.levelMax ? localStorage.removeItem("dbr_filter_levelMax") : localStorage.setItem("dbr_filter_levelMax", lvMax);
                splvMin === SLIDER_DEFAULTS.splvMin ? localStorage.removeItem("dbr_filter_splvMin") : localStorage.setItem("dbr_filter_splvMin", splvMin);
                splvMax === SLIDER_DEFAULTS.splvMax ? localStorage.removeItem("dbr_filter_splvMax") : localStorage.setItem("dbr_filter_splvMax", splvMax);
                localStorage.setItem("dbr_filter_hideAcDeleted", document.getElementById("hide-acdeleted").checked);
            }

            // フィルター設定をlocalStorageから読み込む関数（値が存在しない場合はデフォルト値を返す）
            function loadFilterSettings() {
                return {
                    levelMin: parseFloat(localStorage.getItem("dbr_filter_levelMin") ?? SLIDER_DEFAULTS.levelMin),
                    levelMax: parseFloat(localStorage.getItem("dbr_filter_levelMax") ?? SLIDER_DEFAULTS.levelMax),
                    splvMin: parseInt(localStorage.getItem("dbr_filter_splvMin") ?? SLIDER_DEFAULTS.splvMin),
                    splvMax: parseInt(localStorage.getItem("dbr_filter_splvMax") ?? SLIDER_DEFAULTS.splvMax),
                    hideAcDeleted: localStorage.getItem("dbr_filter_hideAcDeleted") === "true"
                };
            }

            function initializeSlider() {
                levelSlider = document.getElementById("level-range");
                const levelMinInput = document.getElementById("level-min");
                const levelMaxInput = document.getElementById("level-max");

                const splvSlider = document.getElementById("splv-range");
                const splvMinInput = document.getElementById("splv-min");
                const splvMaxInput = document.getElementById("splv-max");

                // 保存済みのフィルター設定を読み込む
                const saved = loadFilterSettings();

                noUiSlider.create(levelSlider, {
                    start: [saved.levelMin, saved.levelMax],
                    connect: true,
                    step: 0.01,
                    range: { min: SLIDER_DEFAULTS.levelMin, max: SLIDER_DEFAULTS.levelMax },
                    tooltips: false,
                    format: {
                        to: v => `☆${v.toFixed(2)}`,
                        from: v => parseFloat(v.replace("☆", ""))
                    }
                });

                noUiSlider.create(splvSlider, {
                    start: [saved.splvMin, saved.splvMax],
                    connect: true,
                    step: 1,
                    range: { min: SLIDER_DEFAULTS.splvMin, max: SLIDER_DEFAULTS.splvMax },
                    tooltips: false,
                    format: {
                        to: v => `${v.toFixed(0)}`,
                        from: v => parseFloat(v)
                    }
                });

                // 保存済みのチェックボックス状態を復元する
                document.getElementById("hide-acdeleted").checked = saved.hideAcDeleted;

                // スライダー → input
                levelSlider.noUiSlider.on("update", (values) => {
                    levelMinInput.value = parseFloat(values[0].replace("☆", "")).toFixed(2);
                    levelMaxInput.value = parseFloat(values[1].replace("☆", "")).toFixed(2);
                });

                splvSlider.noUiSlider.on("update", (values) => {
                    splvMinInput.value = parseInt(values[0]);
                    splvMaxInput.value = parseInt(values[1]);
                });

                // input → スライダー
                [levelMinInput, levelMaxInput].forEach(input => {
                    input.addEventListener("change", () => {
                        const min = parseFloat(levelMinInput.value);
                        const max = parseFloat(levelMaxInput.value);
                        if (!isNaN(min) && !isNaN(max)) {
                            levelSlider.noUiSlider.set([min, max]);
                            updateTable();
                        }
                    });
                });

                [splvMinInput, splvMaxInput].forEach(input => {
                    input.addEventListener("change", () => {
                        const min = parseInt(splvMinInput.value);
                        const max = parseInt(splvMaxInput.value);
                        if (!isNaN(min) && !isNaN(max)) {
                            splvSlider.noUiSlider.set([min, max]);
                            updateTable();
                        }
                    });
                });

                // スライダー変更時に再描画・保存
                levelSlider.noUiSlider.on("change", () => { saveFilterSettings(); updateTable(); });
                splvSlider.noUiSlider.on("change", () => { saveFilterSettings(); updateTable(); });

                // チェックボックス変更時に再描画・保存
                document.getElementById("hide-acdeleted").addEventListener("change", () => { saveFilterSettings(); updateTable(); });

                // リセットボタン
                document.getElementById("reset-filters").onclick = () => {
                    levelSlider.noUiSlider.set([SLIDER_DEFAULTS.levelMin, SLIDER_DEFAULTS.levelMax]);
                    splvSlider.noUiSlider.set([SLIDER_DEFAULTS.splvMin, SLIDER_DEFAULTS.splvMax]);
                    levelMinInput.value = SLIDER_DEFAULTS.levelMin.toFixed(2);
                    levelMaxInput.value = SLIDER_DEFAULTS.levelMax.toFixed(2);
                    splvMinInput.value = SLIDER_DEFAULTS.splvMin;
                    splvMaxInput.value = SLIDER_DEFAULTS.splvMax;
                    document.getElementById("hide-acdeleted").checked = false;
                    saveFilterSettings();
                    updateTable();
                };
            }

            function applyFilters(songList) {
                const [lvMin, lvMax] = levelSlider.noUiSlider.get().map(v => parseFloat(v.replace("☆", "")));
                const hideAcDeleted = document.getElementById("hide-acdeleted").checked;

                const splvSlider = document.getElementById("splv-range");
                const [splvMin, splvMax] = splvSlider.noUiSlider.get().map(v => parseInt(v));

                return songList.filter(song => {
                    const acdeleted = !!song.acdelete;
                    if (hideAcDeleted && acdeleted) return false;

                    const level = parseFloat(song.level);
                    const levelOk = isNaN(level) ? true : (level >= lvMin && level <= lvMax);
                    const splv = parseInt(song.splv);
                    const splvOk = isNaN(splv) ? true : (splv >= splvMin && splv <= splvMax);

                    return levelOk && splvOk;
                });
            }

            function updateTable() {
                const filteredData = applyFilters(allSongData);
                makeDBRTable(filteredData, currentMark, null, currentSongTimes);
            }

            function calculateGaugeIncrease(x) {
                let gaugeIncrease;

                if (x < 350) {
                    gaugeIncrease = 80000 / ((x * 6) * 50);
                } else {
                    gaugeIncrease = 80000 / ((x * 2 + 1400) * 50);
                }

                // 0.02% 刻みで「切り捨て」
                let roundedValue = Math.floor(gaugeIncrease / 0.02) * 0.02;

                return roundedValue.toFixed(2);
            }

            function makeDBRTable(info, mark, order, songTimes = {}) {
                const obj = $("#table_int");
                obj.empty(); // 一応中身クリア

                // ヘッダー行はjQueryで追加（列幅を自動計算しやすく）
                obj.append(
                    $("<tr height='20' style='color:white;background-color:#666666'></tr>").append(
                    "<td>レベル</td><td>薦</td><td>ver</td><td>タイトル</td><td>BPM</td>" +
                    "<td>ノーツ数</td><td>皿含</td><td>IR</td><td>SPLv</td><td>動画</td><td>TexTage</td>" +
                    "<td>ゲージ増加量</td><td>平均密度</td><td>コメント</td><td>INF有</td><td>解禁方法</td>"
                    )
                );

                let sections = {};

                info.forEach(data => {
                    const baseLevel = data.level || "未査定";
                    const isDeleted = data.acdelete ? 1 : 0;
                    const displayLevel = data.acdelete ? `†${mark}${baseLevel}` : `${mark}${baseLevel}`;

                    if (!sections[displayLevel]) {
                        sections[displayLevel] = { count: 0, rows: [], displayLevel, isDeleted };
                    }

                    const notesValue = data.notes * 2;
                    const notesDisplay = data.scratch ? (notesValue - (data.scratch * 2)) : `(${notesValue})`;
                    const gaugeIncrease = calculateGaugeIncrease(notesValue);
                    const unlockMethod = formatUnlockMethod(data.infpack); // 解禁方法をフォーマット

                    // 譜面キーを作る（例: "VANESSA(H)"）
                    const chartKey = `${data.title}`;
                    let pureNotes = 0;

                    if (typeof notesDisplay === "number") {
                        pureNotes = notesDisplay;
                    } else if (typeof notesDisplay === "string" && notesDisplay.startsWith("(")) {
                        // ()で囲まれている → notesValue を使用
                        pureNotes = notesValue;
                    } else {
                        // 念のため fallback（皿なし、notesDisplayをそのまま数値化）
                        pureNotes = parseInt(notesDisplay, 10) || notesValue;
                    }

                    let density = "–";
                    const seconds = songTimes[chartKey] || null;

                    if (seconds) {
                        density = (pureNotes / seconds).toFixed(2) + "notes/s";
                    }

                    let row = `<tr class='tr_normal'${seconds ? ` data-playtime="${seconds}"` : ''}>
                    <td class='col-level'>${displayLevel}</td>
                    <td class='col-recommend'>${data.recommend}</td>
                    <td class='col-ver'>${data.ver}</td>
                    <td class='col-title'><a>${data.title}</a></td>
                    <td class='col-bpm'><a>${data.bpm}</a></td>
                    <td class='col-notes'><a data-notes-full='${notesValue}'>${notesDisplay}</a></td>
                    <td class='col-notesfull'><a>${notesValue}</a></td>
                    <td class='col-ir'>
                        <a href="dbr_ir_ranking.html?title=${encodeURIComponent(data.title)}&notesValue=${notesValue}&notesDisplay=${encodeURIComponent(notesDisplay)}&displayLevel=${encodeURIComponent(displayLevel)}" target="_blank">■</a>
                    </td>
                    <td class='col-splv'><a>☆${data.splv}</a></td>`;

                    // 動画列
                    let videoContent = "";

                    if (data.video) {
                        let icon = "", alt = "";

                        if (data.video.includes("nicovideo.jp")) {
                            icon = "nico.gif";
                            alt = "ニコニコ動画";
                        } else if (data.video.includes("youtube.com")) {
                            icon = "youtube.gif";
                            alt = "YouTube";
                        }

                        if (icon) {
                            videoContent += `<a href='${data.video}' target='_blank'><img src='style/${icon}' alt='${alt}' /></a>`;
                        }
                    }

                    if (data.video2) {
                        let icon2 = "", alt2 = "";

                        if (data.video2.includes("nicovideo.jp")) {
                            icon2 = "nico.gif";
                            alt2 = "ニコニコ動画";
                        } else if (data.video2.includes("youtube.com")) {
                            icon2 = "youtube.gif";
                            alt2 = "YouTube";
                        }

                        if (icon2) {
                            if (videoContent) videoContent += "<br>"; // 既に何かある場合は改行
                            videoContent += `<a href='${data.video2}' target='_blank'><img src='style/${icon2}' alt='${alt2}' /></a>`;
                        }
                    }

                    row += `<td class='col-video'>${videoContent}</td>`;

                    // TexTage列
                    if (data.textageid) {
                        let suffix = generateTextageSuffix(data.title, data.splv);
                        let url = `https://textage.cc/score/${data.ver}/${data.textageid}.html?${suffix}`;
                        row += `<td class='col-textage'><a href='${url}' target='_blank'>TexTage</a></td>`;
                    } else {
                        row += `<td class='col-textage'></td>`;
                    }

                    // 残りの列（コメントなど）
                    row += `<td class='col-gauge'>${gaugeIncrease}%/note</td>
                    <td class='col-density'>${density}</td>
                    <td class='col-comment'>${data.comment || ''}</td>
                    <td class='col-inf'>${data.inf || ''}</td>
                    <td class='col-unlock'>${unlockMethod}</td>
                    </tr>`; // 備考・解禁方法の列を追加

                    sections[displayLevel].rows.push(row);
                    sections[displayLevel].count++;
                });

                // 表本体構築（innerHTML一括）
                let htmlContent = "";

                Object.values(sections)
                    .sort((a, b) => {
                        // まず基準レベル（†を除いた部分）で比較
                        const levelA = a.displayLevel.replace(/^†/, '').replace(mark, '');
                        const levelB = b.displayLevel.replace(/^†/, '').replace(mark, '');

                        const levelCompare = levelA.localeCompare(levelB, undefined, { numeric: true });

                        if (levelCompare !== 0) {
                            return levelCompare;
                        }

                        // 同レベルの場合は削除フラグで比較（0=AC収録が先、1=削除が後）
                        return a.isDeleted - b.isDeleted;
                    })
                    .forEach(section => {
                        htmlContent += `<tr class='tr_separate'><td colspan='16' align='center'><b>${section.displayLevel} (${section.count}譜面)</b></td></tr>`;
                        htmlContent += section.rows.join("");
                    });

                obj.append(htmlContent);

                window.dispatchEvent(new CustomEvent('dbrTableRedrawn'));
            }

            // 解禁方法をフォーマットする関数
            function formatUnlockMethod(infpack) {
                if (!infpack) return '';

                return infpack.replace(/BIT/g, 'BIT解禁')
                    .replace(/PK(\d+)/g, 'INFINITAS 楽曲パック vol.$1')
                    .replace(/ST(\d+)/g, 'スタートアップセレクション 楽曲パック vol.$1')
                    .replace(/pm(\d+)/g, "pop'n music セレクション 楽曲パック vol.$1")
                    .replace(/jb(\d+)/g, 'jubeat セレクション 楽曲パック vol.$1')
                    .replace(/SV(\d+)/g, 'SOUND VOLTEX セレクション 楽曲パック vol.$1')
                    .replace(/GD(\d+)/g, 'GITADORA セレクション 楽曲パック vol.$1')
                    .replace(/BPL(\d+)/g, 'BPL セレクション 楽曲パック vol.$1')
                    .replace(/TH(\d+)/g, '東方Project セレクション 楽曲パック vol.$1')
                    .replace(/UM(\d+)/g, 'ULTIMATE MOBILE セレクション 楽曲パック vol.$1')
                    .replace(/DJP/g, 'DJPOINT解禁');
            }

            function generateTextageSuffix(title, splv) {
                let titleChar = title.slice(-2, -1);
                let titleCode = titleChar === "L" ? "X" : titleChar === "B" ? "P" : titleChar;

                // SPLvを数値に変換
                let levelNum = Number(splv);
                let levelCodeMap = { 10: "A", 11: "B", 12: "C" };
                let levelCode = levelCodeMap[levelNum] || splv; // 1桁の数値はそのまま

                let randomDigits = shuffle("1234567");
                return `B${titleCode}${levelCode}00R0${randomDigits}0${shuffle("1234567")}`;
            }

            function shuffle(str) {
                return str.split('').sort(() => Math.random() - 0.5).join('');
            }
        </script>
    </body>
</html>
